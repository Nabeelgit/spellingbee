<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling bee!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="intro-screen" class="screen">
        <h1 class="main-header">Spelling bee!</h1>
        <p class="instructions">The word will be spoken aloud and you will have to type your guess of the spelling of that word into the input box.</p>
        <button id="start-btn">Start</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <h1 class="main-header">Spelling bee!</h1>
        <input id="spell-input" type="text" placeholder="Spell here..." autocomplete="off">
        <div class="button-container">
            <button id="speak-again-btn">Say the word!</button>
            <button id="enter-btn">Enter</button>
        </div>
        <button id="fallback-next-btn" class="fallback-next-btn hidden">Next word</button>
        <h3 id="word-definition"></h3>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal" class="modal">
            <button id="modal-close-btn" class="modal-close" aria-label="Close">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <line x1="4" y1="4" x2="20" y2="20"></line>
                    <line x1="20" y1="4" x2="4" y2="20"></line>
                </svg>
            </button>
            <div id="modal-body" class="modal-body"></div>
            <div class="modal-footer">
                <button id="next-word-btn" class="next-word-btn">Next word</button>
            </div>
        </div>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <script src="./script.js"></script>
</body>
</html>
